services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: card_address
      POSTGRES_USER: card
      POSTGRES_PASSWORD: card
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U card -d card_address"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  cep-provider:
    image: wiremock/wiremock:3.9.2
    command: ["--global-response-templating", "--verbose"]
    ports:
      - "8081:8080"
    volumes:
      - ./wiremock:/home/wiremock
