name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Runs unit + integration + e2e (Testcontainers uses the Docker preinstalled
      # on the runner) and the JaCoCo 80% line-coverage gate via `check`.
      - name: Build and test
        run: ./gradlew build --no-daemon

      - name: Publish test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test
